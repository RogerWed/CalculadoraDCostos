<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora de Costos Pro</title>
    <link href="icon.jpg" rel="icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root {
            --primary: #0d6efd;
            --secondary: #6c757d;
            --success: #198754;
            --info: #0dcaf0;
            --warning: #ffc107;
            --danger: #dc3545;
            --telegram-bg: #17212b;
            --telegram-card: #242f3d;
            --telegram-text: #ffffff;
            --telegram-muted: #8e9ba8;
            --telegram-accent: #2b5278;
            --telegram-highlight: #5eb5f7;
            --glass-bg: rgba(36, 47, 61, 0.85);
            --glass-border: rgba(94, 181, 247, 0.15);
        }

        [data-bs-theme="light"] {
            --telegram-bg: #f5f7fa;
            --telegram-card: #ffffff;
            --telegram-text: #1a1a2e;
            --telegram-muted: #6b7280;
            --telegram-accent: #e3f0ff;
            --telegram-highlight: #0d6efd;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(13, 110, 253, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--telegram-bg);
            color: var(--telegram-text);
            min-height: 100vh;
            padding-bottom: 100px;
            overflow-x: hidden;
        }

        /* ===== SPLASH SCREEN PWA ===== */
        #pwa-splash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #17212b;
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease, visibility 0.5s;
        }

        .splash-logo {
            width: 120px;
            height: 120px;
            border-radius: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 20px;
            animation: pulseLogo 2s infinite ease-in-out;
        }

        .splash-version {
            position: absolute;
            bottom: 40px;
            color: #8e9ba8;
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        @keyframes pulseLogo {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* ===== LOGIN SCREEN ===== */
        #login-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--telegram-bg);
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            background: var(--telegram-card);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
        }

        /* ===== NAV PROFILE PIC ===== */
        .nav-profile-img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--telegram-highlight);
        }

        /* ===== ANIMATED BACKGROUND ===== */
        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .bg-mesh .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.15;
            animation: orbFloat 20s ease-in-out infinite;
        }

        .bg-mesh .orb:nth-child(1) { width: 400px; height: 400px; background: var(--primary); top: -100px; left: -100px; animation-delay: 0s; }
        .bg-mesh .orb:nth-child(2) { width: 300px; height: 300px; background: var(--info); top: 40%; right: -80px; animation-delay: -7s; }
        .bg-mesh .orb:nth-child(3) { width: 250px; height: 250px; background: var(--success); bottom: 10%; left: 20%; animation-delay: -14s; }

        @keyframes orbFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        #particlesCanvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1; }
        .content-layer { position: relative; z-index: 2; display: none; }

        /* ===== TELEGRAM FLOATING NAVBAR ===== */
        .telegram-nav {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 8px 16px;
            display: flex;
            gap: 4px;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            max-width: 95vw;
        }

        .nav-item-tg {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 10px 16px;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: var(--telegram-muted);
            text-decoration: none;
            position: relative;
            min-width: 64px;
            border: none;
            background: transparent;
        }

        .nav-item-tg:hover, .nav-item-tg.active {
            color: var(--telegram-highlight);
            background: rgba(94, 181, 247, 0.15);
        }

        .nav-item-tg i { font-size: 1.3rem; }
        .nav-item-tg span { font-size: 0.65rem; font-weight: 500; }

        /* ===== CARDS & ELEMENTS ===== */
        .tg-card { background: var(--telegram-card); border: 1px solid var(--glass-border); border-radius: 20px; padding: 24px; margin-bottom: 20px; }
        .tg-input { background: var(--telegram-bg); border: 2px solid var(--glass-border); border-radius: 14px; padding: 12px 16px; color: var(--telegram-text); width: 100%; transition: all 0.3s; }
        .tg-input:focus { outline: none; border-color: var(--telegram-highlight); }
        .tg-btn { border: none; border-radius: 14px; padding: 12px 24px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 8px; justify-content: center; transition: 0.3s; }
        .tg-btn-primary { background: linear-gradient(135deg, var(--primary), #0b5ed7); color: white; }
        .tg-btn-danger { background: linear-gradient(135deg, var(--danger), #b02a37); color: white; }
        .tg-btn-success { background: linear-gradient(135deg, var(--success), #146c43); color: white; }
    </style>
</head>
<body>

    <div id="pwa-splash">
        <img src="icon.jpg" alt="Logo" class="splash-logo" onerror="this.src='https://placehold.co/120x120/0d6efd/ffffff?text=Costos+Pro'">
        <div class="splash-version">v2.1.0</div>
    </div>

    <div id="login-screen">
        <div class="login-card">
            <div class="tg-card-icon mx-auto mb-4" style="width:64px; height:64px; font-size:2rem; background: linear-gradient(135deg, var(--primary), var(--info)); border-radius:20px; display:flex; align-items:center; justify-content:center; color:white;">
                <i class="bi bi-calculator-fill"></i>
            </div>
            <h3 class="fw-bold mb-2">Costos Pro</h3>
            <p class="text-muted small mb-4">Gestione sus costos e inventarios de forma segura e independiente.</p>
            <button class="tg-btn tg-btn-primary w-100 py-3" onclick="loginWithGoogle()">
                <i class="bi bi-google"></i> Continuar con Google
            </button>
        </div>
    </div>

    <div class="bg-mesh">
        <div class="orb"></div>
        <div class="orb"></div>
        <div class="orb"></div>
    </div>
    <canvas id="particlesCanvas"></canvas>
    <div class="toast-container-custom" id="toastContainer"></div>

    <div class="content-layer" id="app-content">
        <header class="app-header">
            <div class="container">
                <div class="d-flex justify-content-between align-items-center">
                    <div class="d-flex align-items-center gap-3">
                        <div class="tg-card-icon" style="width:40px;height:40px;font-size:1.1rem; display:flex; align-items:center; justify-content:center; background:linear-gradient(135deg, var(--primary), var(--info)); color:white; border-radius:10px;">
                            <i class="bi bi-calculator-fill"></i>
                        </div>
                        <div>
                            <h1 class="header-title mb-0" style="font-size:1.4rem; font-weight:800;">Costos Pro</h1>
                        </div>
                    </div>
                    <div class="d-flex align-items-center gap-3">
                        <button class="tg-btn tg-btn-danger btn-sm py-2 px-3" onclick="logout()" title="Cerrar Sesión">
                            <i class="bi bi-box-arrow-right"></i>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <section id="section-dashboard" class="section-page active container py-4">
            <div class="tg-card">
                <h4 class="fw-bold mb-3">Panel de Resumen</h4>
                <p class="text-muted">Bienvenido a su gestor personalizado de costos.</p>
            </div>
        </section>

        <section id="section-products" class="section-page container py-4" style="display:none;">
            <div class="tg-card">
                <h5 class="fw-bold mb-3">Añadir Producto</h5>
                <form id="productForm" onsubmit="event.preventDefault(); saveProduct();">
                    <div class="row g-3">
                        <div class="col-12"><input type="text" id="productName" class="tg-input" placeholder="Nombre del Producto" required></div>
                        <div class="col-md-6"><input type="number" id="totalCost" step="0.01" class="tg-input" placeholder="Costo Total (USD)" required></div>
                        <div class="col-md-6"><input type="number" id="units" class="tg-input" placeholder="Unidades por empaque" required></div>
                        <div class="col-md-6"><input type="number" id="empaques" class="tg-input" placeholder="Cantidad de Empaques" required></div>
                        <div class="col-md-6"><input type="number" id="profit" step="0.01" class="tg-input" placeholder="% de Ganancia" required></div>
                    </div>
                    <button type="submit" class="tg-btn tg-btn-success w-100 mt-3">Guardar Producto</button>
                </form>
            </div>

            <div class="tg-card">
                <h5 class="fw-bold mb-3">Exportar Lista de Precios</h5>
                <div class="row g-3 align-items-end">
                    <div class="col-md-4">
                        <label class="small text-muted mb-1">Fecha Desde</label>
                        <input type="date" id="pdfDateFrom" class="tg-input">
                    </div>
                    <div class="col-md-4">
                        <label class="small text-muted mb-1">Fecha Hasta</label>
                        <input type="date" id="pdfDateTo" class="tg-input">
                    </div>
                    <div class="col-md-4">
                        <button class="tg-btn tg-btn-primary w-100" onclick="generateFilteredPDF()">
                            <i class="bi bi-file-earmark-pdf"></i> Descargar PDF
                        </button>
                    </div>
                </div>
            </div>

            <div class="tg-card">
                <h5 class="fw-bold mb-3">Mis Productos Guardados</h5>
                <div class="table-responsive">
                    <table class="table table-dark table-striped align-middle" id="productsTable">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Costo Unit.</th>
                                <th>Precio Venta</th>
                                <th>Fecha</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="productsListBody"></tbody>
                    </table>
                </div>
            </div>
        </section>

        <nav class="telegram-nav">
            <button class="nav-item-tg active" onclick="switchTab('section-dashboard', this)">
                <i class="bi bi-grid-1x2-fill"></i>
                <span>Panel</span>
            </button>
            <button class="nav-item-tg" onclick="switchTab('section-products', this)">
                <i class="bi bi-box-seam-fill"></i>
                <span>Productos</span>
            </button>
            <div class="nav-item-tg d-flex align-items-center justify-content-center" style="min-width:64px;">
                <img id="userAvatar" src="https://placehold.co/32x32/0d6efd/ffffff?text=U" alt="Perfil" class="nav-profile-img">
            </div>
        </nav>
    </div>

    <script>
        // CONFIGURACIÓN DE SUPABASE (Reemplaza con tus credenciales reales de Supabase)
        const SUPABASE_URL = "https://pbkeawvhdfncpuzehsrw.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_R2OiRBqSzP8mMVV8sjni7A_-oco6wu1";
        
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        let currentUser = null;

        // 5 & 6. CONTROL DEL SPLASH SCREEN Y LOGIN
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const splash = document.getElementById('pwa-splash');
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    checkAuthState();
                }, 500);
            }, 3000); // 3 Segundos fijos de Splash Screen regulados
        });

        // CONTROL DE AUTENTICACIÓN
        async function checkAuthState() {
            const { data: { session } } = await supabase.auth.getSession();
            handleUserSession(session);

            supabase.auth.onAuthStateChange((_event, session) => {
                handleUserSession(session);
            });
        }

        function handleUserSession(session) {
            if (session) {
                currentUser = session.user;
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('app-content').style.display = 'block';
                
                // 4. Asignar foto del usuario autenticado vía Google
                if (currentUser.user_metadata && currentUser.user_metadata.avatar_url) {
                    document.getElementById('userAvatar').src = currentUser.user_metadata.avatar_url;
                }
                loadUserProducts();
            } else {
                currentUser = null;
                document.getElementById('app-content').style.display = 'none';
                document.getElementById('login-screen').style.display = 'flex';
            }
        }

        // 1. LOGIN EXCLUSIVO CON GOOGLE OAUTH
        async function loginWithGoogle() {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: window.location.origin + window.location.pathname
                }
            });
            if (error) showToast("Error", error.message, "error");
        }

        async function logout() {
            await supabase.auth.signOut();
        }

        // CONTROL DE INTERFAZ DE NAVEGACIÓN
        function switchTab(sectionId, element) {
            document.querySelectorAll('.section-page').forEach(sec => sec.style.display = 'none');
            document.querySelectorAll('.nav-item-tg').forEach(btn => btn.classList.remove('active'));
            document.getElementById(sectionId).style.display = 'block';
            element.classList.add('active');
        }

        // 3. PERSISTENCIA DE DATOS DE FORMA INDEPENDIENTE (FILTRADO AUTOMÁTICO POR USER_ID)
        async function loadUserProducts() {
            if (!currentUser) return;

            const { data: products, error } = await supabase
                .from('products')
                .select('*')
                .eq('user_id', currentUser.id) // Regla crítica multiusuario
                .order('created_at', { ascending: false });

            if (error) {
                showToast("Error", "No se cargaron los productos.", "error");
                return;
            }

            const tbody = document.getElementById('productsListBody');
            tbody.innerHTML = '';

            if (products.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted py-4">No posee productos registrados.</td></tr>`;
                return;
            }

            products.forEach(p => {
                const dateFormated = new Date(p.created_at).toLocaleDateString();
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${p.name}</strong></td>
                        <td>$${p.unit_cost.toFixed(2)}</td>
                        <td>$${p.sale_price.toFixed(2)}</td>
                        <td>${dateFormated}</td>
                        <td>
                            <button class="btn btn-sm btn-danger" onclick="deleteProduct('${p.id}')">
                                <i class="bi bi-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        async function saveProduct() {
            const name = document.getElementById('productName').value;
            const cost = parseFloat(document.getElementById('totalCost').value);
            const units = parseInt(document.getElementById('units').value);
            const empaques = parseInt(document.getElementById('empaques').value);
            const profit = parseFloat(document.getElementById('profit').value);

            const totalUnits = units * empaques;
            const unitCost = cost / totalUnits;
            const salePrice = unitCost * (1 + (profit / 100));

            // Guardado incluyendo llave foránea de usuario activa (multiusuario seguro)
            const { error } = await supabase
                .from('products')
                .insert([{
                    user_id: currentUser.id,
                    name: name,
                    unit_cost: unitCost,
                    sale_price: salePrice,
                    created_at: new Date().toISOString()
                }]);

            if (error) {
                showToast("Error", error.message, "error");
            } else {
                showToast("Éxito", "Producto registrado de manera independiente.", "success");
                document.getElementById('productForm').reset();
                loadUserProducts();
            }
        }

        async function deleteProduct(id) {
            const { error } = await supabase
                .from('products')
                .delete()
                .eq('id', id)
                .eq('user_id', currentUser.id); // Validar pertenencia del registro

            if (error) {
                showToast("Error", error.message, "error");
            } else {
                showToast("Eliminado", "Producto borrado.", "success");
                loadUserProducts();
            }
        }

        // 2. DESCARGAR PDF FILTRADO POR RANGO DE FECHAS
        async function generateFilteredPDF() {
            const fromDate = document.getElementById('pdfDateFrom').value;
            const toDate = document.getElementById('pdfDateTo').value;

            if (!fromDate || !toDate) {
                showToast("Atención", "Por favor defina un rango de fechas completo.", "warning");
                return;
            }

            // Consulta condicionada exclusivamente al rango temporal y al ID de usuario logueado
            let query = supabase
                .from('products')
                .select('*')
                .eq('user_id', currentUser.id)
                .gte('created_at', new Date(fromDate + "T00:00:00").toISOString())
                .lte('created_at', new Date(toDate + "T23:59:59").toISOString());

            const { data: filteredProducts, error } = await query;

            if (error || !filteredProducts || filteredProducts.length === 0) {
                showToast("Información", "No hay productos guardados en el rango seleccionado.", "info");
                return;
            }

            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            doc.setFont("Helvetica", "bold");
            doc.setFontSize(18);
            doc.text("REPORTE DE PRECIOS PERSONALIZADO", 14, 20);
            
            doc.setFontSize(10);
            doc.setFont("Helvetica", "normal");
            doc.text(`Rango: Desde ${fromDate} hasta ${toDate}`, 14, 28);
            doc.text(`Usuario: ${currentUser.email}`, 14, 34);

            doc.line(14, 38, 196, 38);

            // Cabeceras de la Tabla PDF
            doc.setFont("Helvetica", "bold");
            doc.text("Producto", 16, 46);
            doc.text("Costo Unit.", 80, 46);
            doc.text("Precio Venta", 130, 46);
            doc.text("Fecha", 170, 46);
            doc.line(14, 50, 196, 50);

            doc.setFont("Helvetica", "normal");
            let yPosition = 58;

            filteredProducts.forEach(p => {
                if (yPosition > 270) {
                    doc.addPage();
                    yPosition = 20;
                }
                const formattedDate = new Date(p.created_at).toLocaleDateString();
                doc.text(p.name, 16, yPosition);
                doc.text(`$${p.unit_cost.toFixed(2)}`, 80, yPosition);
                doc.text(`$${p.sale_price.toFixed(2)}`, 130, yPosition);
                doc.text(formattedDate, 170, yPosition);
                yPosition += 10;
            });

            doc.save(`Reporte_Costos_${fromDate}_A_${toDate}.pdf`);
            showToast("PDF", "Reporte descargado correctamente.", "success");
        }

        // SISTEMA DE TOAST NOTIFICATIONS
        function showToast(title, message, type = "success") {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `tg-toast show`;
            toast.innerHTML = `
                <div class="toast-content">
                    <h6 class="toast-title text-capitalize">${title}</h6>
                    <p class="toast-message">${message}</p>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => {
                toast.classList.remove('show');
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 400);
            }, 3500);
        }
    </script>
</body>
</html>
